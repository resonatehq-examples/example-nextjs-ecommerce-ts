<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One-Click Buy — Resonate Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #080a0e;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #111318;
      border: 1px solid #1e2430;
      border-radius: 12px;
      padding: 32px;
      width: 380px;
      text-align: center;
    }
    .product-image {
      width: 120px;
      height: 120px;
      background: #1a1f2e;
      border-radius: 12px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .price { font-size: 28px; font-weight: 700; color: #1ee3cf; margin: 12px 0; }
    .description { color: #8a8f9e; font-size: 14px; margin-bottom: 24px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-buy { background: #1ee3cf; color: #080a0e; }
    .btn-cancel { background: #2a1f1f; color: #e05a5a; border: 1px solid #e05a5a; margin-top: 10px; }
    .status-box {
      margin-top: 20px;
      padding: 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }
    .status-pending { background: #1a1f2e; border: 1px solid #2a3450; color: #8899cc; }
    .status-confirmed { background: #0f2e1a; border: 1px solid #1a5c30; color: #4cde80; }
    .status-cancelled { background: #2a1a1a; border: 1px solid #5c1a1a; color: #e05a5a; }
    .countdown {
      font-size: 48px;
      font-weight: 700;
      color: #1ee3cf;
      margin: 10px 0;
    }
    .countdown-label { font-size: 12px; color: #8a8f9e; text-transform: uppercase; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="product-image">📦</div>
    <h1>Resonate Widget Pro</h1>
    <div class="price">$29.00</div>
    <p class="description">The crash-proof widget. Survives process restarts, network failures, and your worst deployment days.</p>

    <button class="btn btn-buy" id="buyBtn" onclick="startPurchase()">Buy Now</button>

    <div id="cancelSection" style="display:none">
      <div class="countdown-label">Cancel within</div>
      <div class="countdown" id="countdown">5</div>
      <button class="btn btn-cancel" id="cancelBtn" onclick="cancelPurchase()">Cancel Order</button>
    </div>

    <div class="status-box" id="statusBox"></div>
  </div>

  <script>
    let currentKey = null;
    let countdownInterval = null;

    async function startPurchase() {
      const buyBtn = document.getElementById('buyBtn');
      buyBtn.disabled = true;

      // Generate idempotency key — re-clicking Buy with the same key
      // is a no-op (Resonate returns the existing workflow result)
      currentKey = 'buy-' + Date.now();

      showStatus('pending', 'Processing...');

      try {
        await fetch(`/buy/${currentKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ itemId: 'widget-001' }),
        });

        // Show cancellation window
        document.getElementById('cancelSection').style.display = 'block';
        startCountdown(5);
        pollStatus();
      } catch (err) {
        showStatus('pending', 'Error — please try again');
        buyBtn.disabled = false;
      }
    }

    async function cancelPurchase() {
      if (!currentKey) return;
      document.getElementById('cancelBtn').disabled = true;
      await fetch(`/cancel/${currentKey}`, { method: 'POST' });
    }

    function startCountdown(seconds) {
      let remaining = seconds;
      document.getElementById('countdown').textContent = remaining;

      countdownInterval = setInterval(() => {
        remaining--;
        const el = document.getElementById('countdown');
        if (el) el.textContent = remaining;
        if (remaining <= 0) {
          clearInterval(countdownInterval);
          document.getElementById('cancelSection').style.display = 'none';
        }
      }, 1000);
    }

    async function pollStatus() {
      if (!currentKey) return;

      try {
        const res = await fetch(`/status/${currentKey}`);
        const data = await res.json();

        if (data.status === 'done') {
          clearInterval(countdownInterval);
          document.getElementById('cancelSection').style.display = 'none';

          if (data.result.state === 'PURCHASE_CONFIRMED') {
            showStatus('confirmed', `Order confirmed! (${data.result.orderId})`);
          } else {
            showStatus('cancelled', 'Order cancelled');
            document.getElementById('buyBtn').disabled = false;
          }
          return;
        }

        // Still pending — poll again
        setTimeout(pollStatus, 500);
      } catch {
        setTimeout(pollStatus, 1000);
      }
    }

    function showStatus(type, message) {
      const box = document.getElementById('statusBox');
      box.className = 'status-box status-' + type;
      box.textContent = message;
      box.style.display = 'block';
    }
  </script>
</body>
</html>
